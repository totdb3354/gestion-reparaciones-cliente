name: Build Installers

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

defaults:
  run:
    shell: bash
    working-directory: gestion-reparaciones-cliente

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            jfx-jmods-zip: openjfx-21_osx-x64_bin-jmods.zip
            pkg-type: dmg
            pkg-version: 1.0.0
            icon-arg: "--icon packaging/icono_mac.icns"
            artifact: FSGR-mac
            appimage-artifact: FSGR-mac-appimage
          - os: macos-13
            jfx-jmods-zip: openjfx-21_osx-x64_bin-jmods.zip
            pkg-type: dmg
            pkg-version: 1.0.0
            icon-arg: "--icon packaging/icono_mac.icns"
            artifact: FSGR-mac-intel
            appimage-artifact: FSGR-mac-intel-appimage
          - os: windows-latest
            jfx-jmods-zip: openjfx-21_windows-x64_bin-jmods.zip
            pkg-type: msi
            pkg-version: 0.11.1
            icon-arg: "--icon packaging/icono_Windows.ico"
            artifact: FSGR-windows
            appimage-artifact: FSGR-windows-appimage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Crear config.properties
        run: echo "api.url=${{ secrets.API_URL }}" > src/main/resources/config.properties

      - name: Build con Maven
        run: mvn package -DskipTests

      - name: Descargar JavaFX jmods
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            if [ "$(uname -m)" == "arm64" ]; then
              JFX_ZIP="openjfx-21_osx-aarch64_bin-jmods.zip"
            else
              JFX_ZIP="openjfx-21_osx-x64_bin-jmods.zip"
            fi
          else
            JFX_ZIP="${{ matrix.jfx-jmods-zip }}"
          fi
          curl -L "https://download2.gluonhq.com/openjfx/21/${JFX_ZIP}" -o javafx-jmods.zip
          unzip -q javafx-jmods.zip

      - name: Preparar libs
        run: |
          mkdir -p target/libs
          cp target/gestion-reparaciones-cliente-*.jar target/libs/
          rm -f target/libs/javafx-*.jar

      - name: Crear runtime con jlink
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then SEP=";"; else SEP=":"; fi
          jlink \
            --module-path "$JAVA_HOME/jmods${SEP}javafx-jmods-21" \
            --add-modules java.base,java.desktop,java.logging,java.management,java.naming,java.net.http,java.prefs,java.sql,java.xml,javafx.controls,javafx.fxml,javafx.base,javafx.graphics,jdk.crypto.ec,jdk.unsupported \
            --output custom-runtime \
            --no-header-files \
            --no-man-pages

      - name: Empaquetar con jpackage
        run: |
          jpackage \
            --type ${{ matrix.pkg-type }} \
            --name "FSGR" \
            --app-version ${{ matrix.pkg-version }} \
            --input target/libs \
            --main-jar gestion-reparaciones-cliente-0.11.1.jar \
            --main-class com.reparaciones.App \
            --runtime-image custom-runtime \
            --java-options "--add-modules=javafx.controls,javafx.fxml" \
            --java-options "-Dfile.encoding=UTF-8" \
            ${{ matrix.icon-arg }}

      - name: Subir instalador
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            gestion-reparaciones-cliente/*.dmg
            gestion-reparaciones-cliente/*.msi
          if-no-files-found: error

      - name: Generar app-image portable
        run: |
          jpackage \
            --type app-image \
            --name "FSGR" \
            --app-version ${{ matrix.pkg-version }} \
            --input target/libs \
            --main-jar gestion-reparaciones-cliente-0.11.1.jar \
            --main-class com.reparaciones.App \
            --runtime-image custom-runtime \
            --java-options "--add-modules=javafx.controls,javafx.fxml" \
            --java-options "-Dfile.encoding=UTF-8" \
            ${{ matrix.icon-arg }}

      - name: Subir app-image
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.appimage-artifact }}
          path: |
            gestion-reparaciones-cliente/FSGR.app
            gestion-reparaciones-cliente/FSGR
          if-no-files-found: warn

# Nota: se generan seis artefactos en paralelo (dos por job):
#   FSGR-mac              → .dmg para Apple Silicon (M1/M2/M3) — runner macos-latest (ARM64)
#   FSGR-mac-appimage     → app-image portable para Apple Silicon
#   FSGR-mac-intel        → .dmg para Macs Intel (pre-2020)    — runner macos-13 (x64)
#   FSGR-mac-intel-appimage → app-image portable para Macs Intel
#   FSGR-windows          → .msi para Windows
#   FSGR-windows-appimage → app-image portable para Windows
